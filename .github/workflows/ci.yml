name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run unit tests (XML output)
        run: uv run pytest tests/unit/ --junitxml=reports/unit.xml --html=reports/unit.html  --self-contained-html -v

      - name: Run integration tests (XML output)
        run: uv run pytest tests/integration/ --junitxml=reports/int.xml --html=reports/int.html --self-contained-html -v

      - name: Run BDD tests (JSON output)
        run: |
          uv run behave features/ -f modern -o reports/e2e-report.html
          # Module-scoped Cucumber JSON for SpecTracer dogfood
          uv run behave features/coverage_linking.feature --tags=-@FC-004 -f json -o reports/e2e-linker.json
          uv run behave features/coverage_edge_cases.feature --tags=-@FC-EDGE-006 -f json -o reports/e2e-linker-edge.json
          uv run behave features/coverage_linking.feature --tags=@FC-004 -f json -o reports/e2e-collectors.json
          uv run behave features/coverage_health.feature -f json -o reports/e2e-aggregator.json
          uv run behave features/coverage_internals.feature --tags=@FC-008 -f json -o reports/e2e-aggregator-internals.json
          uv run behave features/coverage_dashboard.feature -f json -o reports/e2e-renderers.json
          uv run behave features/coverage_internals.feature --tags=@FC-009 -f json -o reports/e2e-renderers-internals.json
          uv run behave features/coverage_module_scope.feature -f json -o reports/e2e-parsers.json
          uv run behave features/coverage_edge_cases.feature --tags=@FC-EDGE-006 -f json -o reports/e2e-parsers-edge.json
          uv run behave features/coverage_internals.feature --tags=@FC-007 -f json -o reports/e2e-parsers-internals.json
          uv run behave features/coverage_json_output.feature -f json -o reports/e2e-report-model.json

      - name: Generate SpecTracer report
        if: always()
        run: uv run python build_pyramid.py

      - name: Validate JSON report against schema
        if: always()
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          from jsonschema import Draft7Validator

          config = json.load(open('spectracer.config.json', encoding='utf-8'))
          output_json = config.get('output_json')
          if not output_json:
              print('output_json not set in config — skipping JSON validation')
          elif not Path(output_json).exists():
              raise SystemExit(f'output_json is set to {output_json!r} but the file was not generated')
          else:
              report = json.load(open(output_json, encoding='utf-8'))
              schema = json.load(open('spectracer-report.schema.json', encoding='utf-8'))
              Draft7Validator(schema).validate(report)
              print(f'{output_json} is valid')
          "

      - name: Write coverage summary
        if: always()
        run: |
          uv run python -c "
          import json
          from pathlib import Path

          config = json.load(open('spectracer.config.json', encoding='utf-8'))
          output_json = config.get('output_json')
          if not output_json or not Path(output_json).exists():
              raise SystemExit(0)

          report = json.load(open(output_json, encoding='utf-8'))
          c = report['summary']['completion']
          h = report['summary']['health']
          p = report['summary']['pyramid']
          lines = ['## SpecTracer Coverage', '', f\"**{c['tested']}/{c['total']} scenarios complete ({c['percent']}%)** — health: **{h['status']}**\", '']
          if h['reasons']:
              lines += ['**Reasons:**'] + [f'- {r}' for r in h['reasons']] + ['']
          if p:
              lines += ['| Layer | Tests | Duration (ms) | Pass rate |', '|---|---|---|---|']
              lines += [f\"| {name} | {s['testCount']} | {s['duration']:.0f} | {s['passRate']}% |\" for name, s in p.items()]
          Path('summary.md').write_text(chr(10).join(lines), encoding='utf-8')
          "
          if [ -f summary.md ]; then
            cat summary.md >> "$GITHUB_STEP_SUMMARY"
            rm summary.md
          fi

      - name: Upload report
        if: always()
        uses: mmkal/artifact.ci/upload@main
        with:
          name: reports
          path: reports/
          artifactci-mode: eager
          artifactci-visibility: public