name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
          Bump type (major, minor, patch) or explicit semver (e.g. 1.2.0)
        required: true
        default: minor

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"
          INPUT=${{ github.event.inputs.version }}
          if [[ "$INPUT" =~ ^(major|minor|patch)$ ]]; then
            NEW=$(npx semver "$LATEST" -i "$INPUT")
          else
            NEW="$INPUT"
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Releasing v$NEW"

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Update version in docs badge
        run: |
          V=v${{ steps.version.outputs.version }}
          sed -i "s|\(hero-badge[^\"]*\"[^>]*>\) *&#9670; v[0-9.]\+|\1\&#9670; $V|" docs/index.html

      - name: Build wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Commit and tag
        run: |
          git add pyproject.toml docs/index.html
          if git diff --cached --quiet; then
            echo "No version files changed — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
